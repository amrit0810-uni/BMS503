# BMS503 Pipeline Configuration — SARS-CoV-2
# Defaults are set for SARS-CoV-2 Illumina short-read data.
# MINIMUM SETUP: Drop FASTQ files into data/raw/ and NC_045512.fasta into data/reference/

# Project identification
project_name: "Genomic Surveillance Analysis"
organism: "SARS-CoV-2"
description: "Automated phylogenetic and diagnostic analysis"  # Project description

# Data directories
data_dir: "data/raw"

# Reference genome settings
# OPTION 1: Auto-detection (recommended) - leave reference_fasta commented out
# The pipeline will automatically detect any .fasta, .fa, .fna file in data/reference/
reference_dir: "data/reference"

# OPTION 2: Explicitly specify reference file (uncomment if needed)
# reference_fasta: "data/reference/reference_genome.fasta"

# Quality Control thresholds (tuned for SARS-CoV-2 Illumina short reads)
# Note: these are documented here for reference; thresholds are applied in
# workflow/scripts/qc_assessment.py
qc_thresholds:
  min_read_length: 50          # Reads shorter than this are discarded by fastp
  min_q30_pct: 75              # Minimum % of bases with Phred quality ≥30
  min_mapped_reads: 50         # Minimum % of reads mapping to reference (fail gate)

# Variant calling
variants:
  min_allele_frequency: 0.1    # Minimum allele frequency for a variant to be retained

# Nextclade dataset — downloaded automatically by setup.sh
# Falls back to live download if the directory is missing
nextclade_dataset_dir: "data/nextclade_db/sars-cov-2"